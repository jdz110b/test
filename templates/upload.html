<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上传语料 - 语料评测平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            flex: 1;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .nav-link {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }
        
        .upload-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
        }
        
        .form-group select,
        .form-group input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        
        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .upload-area:hover {
            background: rgba(102, 126, 234, 0.1);
        }
        
        .upload-area.dragover {
            background: rgba(102, 126, 234, 0.2);
            border-color: #5568d3;
        }
        
        .upload-icon {
            font-size: 48px;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .upload-text {
            color: #666;
            font-size: 16px;
        }
        
        .upload-hint {
            color: #999;
            font-size: 14px;
            margin-top: 10px;
        }
        
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s ease;
            width: 100%;
        }
        
        .btn:hover {
            background: #5568d3;
        }
        
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }
        
        .result.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .result.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .file-info {
            margin-top: 15px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 5px;
            display: none;
        }
        
        .file-info p {
            margin: 5px 0;
            color: #666;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📁 上传语料</h1>
            <p><a href="/" class="nav-link">← 返回首页</a></p>
        </div>
        
        <div class="upload-card">
            <div class="form-group">
                <label for="corpus_type">语料类型</label>
                <select id="corpus_type" name="corpus_type">
                    <option value="question">Question语料</option>
                    <option value="qa">QA对语料</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>选择文件</label>
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📄</div>
                    <div class="upload-text">点击或拖拽文件到此处上传</div>
                    <div class="upload-hint">支持 CSV、TXT 格式，最大 16MB</div>
                    <input type="file" id="fileInput" name="file" accept=".csv,.txt" style="display: none;">
                </div>
            </div>
            
            <div class="file-info" id="fileInfo">
                <p><strong>文件名：</strong><span id="fileName"></span></p>
                <p><strong>文件大小：</strong><span id="fileSize"></span></p>
                <p><strong>文件类型：</strong><span id="fileType"></span></p>
            </div>
            
            <button class="btn" id="uploadBtn" disabled>上传文件</button>
            
            <div class="loading" id="loading">
                <div class="loading-spinner"></div>
                <p>正在上传和解析文件...</p>
            </div>
            
            <div class="result" id="result"></div>
        </div>
    </div>
    
    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const fileInfo = document.getElementById('fileInfo');
        const result = document.getElementById('result');
        const loading = document.getElementById('loading');
        
        let selectedFile = null;
        
        // 点击上传区域
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });
        
        // 文件选择
        fileInput.addEventListener('change', (e) => {
            handleFileSelect(e.target.files[0]);
        });
        
        // 拖拽上传
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            handleFileSelect(file);
        });
        
        function handleFileSelect(file) {
            if (!file) return;
            
            // 验证文件类型
            const validTypes = ['.csv', '.txt'];
            const fileExtension = '.' + file.name.split('.').pop().toLowerCase();
            
            if (!validTypes.includes(fileExtension)) {
                showResult('error', '不支持的文件格式，请上传 CSV 或 TXT 文件');
                return;
            }
            
            // 验证文件大小
            if (file.size > 16 * 1024 * 1024) {
                showResult('error', '文件大小超过限制（最大 16MB）');
                return;
            }
            
            selectedFile = file;
            
            // 显示文件信息
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileSize').textContent = formatFileSize(file.size);
            document.getElementById('fileType').textContent = fileExtension.toUpperCase();
            fileInfo.style.display = 'block';
            
            // 启用上传按钮
            uploadBtn.disabled = false;
            
            // 清除之前的结果
            result.style.display = 'none';
        }
        
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        // 上传文件
        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            
            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('corpus_type', document.getElementById('corpus_type').value);
            
            // 显示加载状态
            loading.style.display = 'block';
            uploadBtn.disabled = true;
            result.style.display = 'none';
            
            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showResult('success', `上传成功！文件：${data.filename}，类型：${data.corpus_type}，数量：${data.count} 条`);
                } else {
                    showResult('error', data.error || '上传失败');
                }
            } catch (error) {
                showResult('error', '上传失败：' + error.message);
            } finally {
                loading.style.display = 'none';
                uploadBtn.disabled = false;
            }
        });
        
        function showResult(type, message) {
            result.className = 'result ' + type;
            result.textContent = message;
            result.style.display = 'block';
        }
    </script>
</body>
</html>
